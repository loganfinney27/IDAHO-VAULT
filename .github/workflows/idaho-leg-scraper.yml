name: Idaho Legislature Scraper

on:
  # Run every day at 6 AM Mountain Time (13:00 UTC)
  # The Idaho legislative session typically runs January–April.
  # The schedule is kept year-round so special sessions are captured too.
  schedule:
    - cron: "0 13 * * *"

  # Allow manual triggers with extra options
  workflow_dispatch:
    inputs:
      year:
        description: "Session year to scrape"
        required: false
        default: "2026"
        type: string
      force:
        description: "Force re-fetch all bills (including finalized)"
        required: false
        default: "false"
        type: boolean
      bill:
        description: "Scrape only one bill (e.g. H0001, S0042). Leave blank for all."
        required: false
        default: ""
        type: string
      members:
        description: "Also scrape House/Senate member profiles"
        required: false
        default: "false"
        type: boolean

jobs:
  scrape:
    name: Scrape Idaho Legislature
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/scripts/requirements-scraper.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements-scraper.txt

      - name: Run scraper
        env:
          YEAR:    ${{ github.event.inputs.year    || '2026' }}
          FORCE:   ${{ github.event.inputs.force   || 'false' }}
          BILL:    ${{ github.event.inputs.bill     || '' }}
          MEMBERS: ${{ github.event.inputs.members  || 'false' }}
        run: |
          ARGS="--year $YEAR"

          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          if [ -n "$BILL" ]; then
            ARGS="$ARGS --bill $BILL"
          fi

          if [ "$MEMBERS" = "true" ]; then
            ARGS="$ARGS --members"
          fi

          python3 .github/scripts/idaho_leg_scraper.py $ARGS

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage vault content that the scraper may have touched
          git add "GOVERNMENTS/IDAHO - LEGISLATIVE/BILLS/"
          git add "GOVERNMENTS/IDAHO - LEGISLATIVE/SESSIONS/"
          git add "GOVERNMENTS/IDAHO - LEGISLATIVE/IDAHO HOUSE/"
          git add "GOVERNMENTS/IDAHO - LEGISLATIVE/IDAHO SENATE/"

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            git commit -m "scrape Idaho legislature — ${CHANGED} file(s) $(date -u +%Y-%m-%d)"
            git push
          fi
